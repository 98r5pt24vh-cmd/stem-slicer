name: Build Stem Slicer Qt for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-2025
    timeout-minutes: 90

    steps:
      - name: Check out Stem Slicer
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install application dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Build OpenKeyScan analyzer
        shell: pwsh
        run: |
          git init openkeyscan-source
          Push-Location openkeyscan-source
          git remote add origin https://github.com/rekordcloud/openkeyscan-analyzer.git
          git fetch --depth 1 origin d5cac64bc7195826b6eb10c55b9b0c97fb3287c0
          git checkout --detach FETCH_HEAD
          python -m venv .venv-build
          ./.venv-build/Scripts/python.exe -m pip install --upgrade pip
          ./.venv-build/Scripts/python.exe -m pip install -r requirements.txt
          ./.venv-build/Scripts/python.exe -m pip install pyinstaller==6.21.0
          ./.venv-build/Scripts/python.exe -m pip check
          ./.venv-build/Scripts/python.exe ../scripts/patch_openkeyscan_spec.py openkeyscan_analyzer.spec
          ./.venv-build/Scripts/python.exe -m PyInstaller --noconfirm openkeyscan_analyzer.spec
          Pop-Location
          New-Item -ItemType Directory -Force vendor-windows | Out-Null
          Copy-Item -Recurse -Force openkeyscan-source/dist/openkeyscan-analyzer vendor-windows/openkeyscan-analyzer

      - name: Download FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force vendor-windows/ffmpeg-bin | Out-Null
          Invoke-WebRequest -Uri "https://github.com/descriptinc/ffmpeg-ffprobe-static/releases/download/b6.1.2-rc.1/ffmpeg-win32-x64" -OutFile "vendor-windows/ffmpeg-bin/ffmpeg.exe"
          $expected = "4b3a7a7c41a4064a8738536da6a304371c1fdc567c599ccb768bebd49ccdb9fb"
          $actual = (Get-FileHash "vendor-windows/ffmpeg-bin/ffmpeg.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Unexpected FFmpeg SHA-256: $actual" }

      - name: Run cross-platform tests
        env:
          QT_QPA_PLATFORM: offscreen
          STEM_SLICER_DISABLE_ENGINE_AUTOSTART: "1"
        run: python -m unittest discover -s tests -v

      - name: Build Windows application
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm StemSlicerWindows.spec
          # Keep the key engine as an opaque, self-contained child bundle.
          # Adding it to Analysis.datas makes PyInstaller inspect its DLLs and
          # copy torch_cpu.dll a second time into the parent application's
          # _internal folder.
          Copy-Item -Recurse -Force `
            "vendor-windows/openkeyscan-analyzer" `
            "dist/Stem Slicer 1.5S Beta/_internal/openkeyscan-analyzer"

      - name: Smoke-test GUI subsystem, FFmpeg and key analyzer
        shell: pwsh
        env:
          STEM_SLICER_KEY_DEBUG: "1"
        run: |
          python scripts/smoke_windows_bundle.py "dist/Stem Slicer 1.5S Beta" 2>&1 | Tee-Object -FilePath smoke-test.log
          if ($LASTEXITCODE -ne 0) {
            $message = (Get-Content smoke-test.log -Raw).Replace("%", "%25").Replace("`r", "").Replace("`n", "%0A")
            Write-Output "::error title=Windows bundle smoke test::$message"
            exit 1
          }

      - name: Audit Windows bundle
        run: python scripts/audit_windows_bundle.py "dist/Stem Slicer 1.5S Beta"

      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: Stem-Slicer-1.5S-Beta-Windows
          path: dist/Stem Slicer 1.5S Beta
          compression-level: 6
          if-no-files-found: error
