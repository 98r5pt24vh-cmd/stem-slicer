name: Build Stem Slicer 1.8.2B for Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2025
    timeout-minutes: 120

    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Check out Stem Slicer
        uses: actions/checkout@v7

      - name: Build official CPython 3.12.13 x64
        shell: pwsh
        run: |
          git clone --branch v3.12.13 --depth 1 https://github.com/python/cpython.git cpython-source
          Push-Location cpython-source
          if ((git rev-parse HEAD).Trim() -ne "3bb231a6a5dc02b95658877318bf61501a7209e9") {
            throw "CPython source is not at the pinned 3.12.13 commit."
          }
          & "PCbuild/build.bat" -e -p x64
          if ($LASTEXITCODE -ne 0) { throw "CPython 3.12.13 x64 build failed." }
          $python = (Resolve-Path "PCbuild/amd64/python.exe").Path
          & $python -m ensurepip --upgrade
          if ($LASTEXITCODE -ne 0) { throw "Could not bootstrap pip in CPython 3.12.13." }
          $pythonDirectory = Split-Path $python
          $env:Path = "$pythonDirectory;$env:Path"
          Add-Content -Path $env:GITHUB_PATH -Value $pythonDirectory
          Pop-Location
          python -c "import platform, sys; assert sys.version_info[:3] == (3, 12, 13), sys.version; assert platform.architecture()[0] == '64bit', platform.architecture()"

      - name: Set up MinGW for the pinned Bungee build
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja

      - name: Validate committed engine assets
        shell: pwsh
        run: |
          $expected = @{
            "analyzer/checkpoints/openkeyscan3.pt" = "5610691be2b3aa21764c5978ca0c2524fcdbf600f09dcbda6c2da937745db600"
            "analyzer/checkpoints/deeprhythm-0.7.pth" = "c7cc8cc0425929cd2bf695474d7ec1fd63ed0d0a4a68f361d4e4b57bd9b3d9c4"
            "assets/key-and-bpm-engine-warmup.wav" = "1a6136de94c4b9d616aba503bb8273c45c0062e50ae2f2e7982da57fc722615f"
            "basic_pitch/saved_models/icassp_2022/nmp.onnx" = "2c3c1d144bfa61ad236e92e169c13535c880469a12a047d4e73451f2c059a0ec"
          }
          foreach ($entry in $expected.GetEnumerator()) {
            $actual = (Get-FileHash $entry.Key -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne $entry.Value) {
              throw "Unexpected SHA-256 for $($entry.Key): $actual"
            }
          }

      - name: Install application dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check
          python -c "import platform, sys, PySide6; assert sys.version_info[:3] == (3, 12, 13), sys.version; assert PySide6.__version__ == '6.11.1', PySide6.__version__; assert platform.architecture()[0] == '64bit', platform.architecture()"

      - name: Build the validated custom key and BPM analyzer
        shell: pwsh
        run: |
          python -m venv analyzer/.venv-build
          & "analyzer/.venv-build/Scripts/python.exe" -m pip install --upgrade pip
          & "analyzer/.venv-build/Scripts/python.exe" -m pip install `
            --index-url https://download.pytorch.org/whl/cpu `
            torch==2.2.2+cpu torchaudio==2.2.2+cpu
          & "analyzer/.venv-build/Scripts/python.exe" -m pip install -r analyzer/requirements-windows.txt
          & "analyzer/.venv-build/Scripts/python.exe" -m pip install pyinstaller==6.21.0
          & "analyzer/.venv-build/Scripts/python.exe" -m pip check
          & "analyzer/.venv-build/Scripts/python.exe" scripts/patch_openkeyscan_spec.py analyzer/openkeyscan_analyzer.spec
          Push-Location analyzer
          & ".venv-build/Scripts/python.exe" -m PyInstaller --clean --noconfirm openkeyscan_analyzer.spec
          Pop-Location
          New-Item -ItemType Directory -Force vendor-windows | Out-Null
          Copy-Item -Recurse -Force `
            "analyzer/dist/openkeyscan-analyzer" `
            "vendor-windows/openkeyscan-analyzer"

      - name: Fetch the pinned Bungee source
        shell: pwsh
        run: |
          git init bungee-source
          Push-Location bungee-source
          git remote add origin https://github.com/bungee-audio-stretch/bungee.git
          git fetch --depth 1 origin 746833f68a574d997ec50443e7cfd2d37b026302
          git checkout --detach FETCH_HEAD
          git submodule update --init --recursive
          git apply ../patches/bungee-waveformatextensible.patch
          git diff --check
          if ((git rev-parse HEAD).Trim() -ne "746833f68a574d997ec50443e7cfd2d37b026302") {
            throw "Bungee source is not at the pinned commit."
          }
          Pop-Location

      - name: Build a static Windows Bungee executable
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd bungee-source
          cmake --preset windows-x86_64 \
            -B ../bungee-build \
            -DBUNGEE_BUILD_SHARED_LIBRARY=OFF \
            -DBUNGEE_VERSION=2.4.24
          cmake --build ../bungee-build --target bungee_executable --parallel 2
          cd ..
          mkdir -p bin
          cp bungee-build/bungee.exe bin/bungee.exe
          ./bin/bungee.exe --help
          dependencies="$(ldd bin/bungee.exe 2>&1 || true)"
          printf '%s\n' "$dependencies"
          if printf '%s\n' "$dependencies" | grep -Eiq 'libgcc|libstdc\+\+|libwinpthread|msys-2\.0|/mingw64/|/usr/bin/|not found'; then
            echo "Bungee unexpectedly depends on a non-system MinGW runtime DLL." >&2
            exit 1
          fi
          test -s bin/bungee.exe

      - name: Download pinned FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force vendor-windows/ffmpeg-bin | Out-Null
          Invoke-WebRequest -Uri "https://github.com/descriptinc/ffmpeg-ffprobe-static/releases/download/b6.1.2-rc.1/ffmpeg-win32-x64" -OutFile "vendor-windows/ffmpeg-bin/ffmpeg.exe"
          $expected = "4b3a7a7c41a4064a8738536da6a304371c1fdc567c599ccb768bebd49ccdb9fb"
          $actual = (Get-FileHash "vendor-windows/ffmpeg-bin/ffmpeg.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "Unexpected FFmpeg SHA-256: $actual" }

      - name: Run cross-platform tests
        env:
          QT_QPA_PLATFORM: offscreen
          STEM_SLICER_DISABLE_ENGINE_AUTOSTART: "1"
        run: python -m unittest discover -s tests -v

      - name: Run native Windows drag-and-drop and Browse regressions
        env:
          QT_QPA_PLATFORM: windows
          STEM_SLICER_DISABLE_ENGINE_AUTOSTART: "1"
        run: >-
          python -m unittest
          tests.test_qt_interface.QtInterfaceTests.test_validated_drop_zones_accept_copy_through_graphics_view
          tests.test_qt_interface.QtInterfaceTests.test_windows_browse_dialog_uses_stable_top_level_owner
          -v

      - name: Build Windows application
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm StemSlicerWindows.spec
          # The analyzer is an opaque child bundle. Copying it after the parent
          # build prevents PyInstaller from collecting its Torch DLLs twice.
          Copy-Item -Recurse -Force `
            "vendor-windows/openkeyscan-analyzer" `
            "dist/Stem Slicer 1.8.2B/_internal/openkeyscan-analyzer"

      - name: Smoke-test the packaged Windows application
        shell: pwsh
        env:
          STEM_SLICER_KEY_DEBUG: "1"
        run: |
          python scripts/smoke_windows_bundle.py "dist/Stem Slicer 1.8.2B" 2>&1 | Tee-Object -FilePath smoke-test.log
          if ($LASTEXITCODE -ne 0) {
            $message = (Get-Content smoke-test.log -Raw).Replace("%", "%25").Replace("`r", "").Replace("`n", "%0A")
            Write-Output "::error title=Windows bundle smoke test::$message"
            exit 1
          }

      - name: Audit Windows bundle
        run: python scripts/audit_windows_bundle.py "dist/Stem Slicer 1.8.2B"

      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: Stem-Slicer-1.8.2B-Windows
          path: dist/Stem Slicer 1.8.2B
          compression-level: 6
          if-no-files-found: error
