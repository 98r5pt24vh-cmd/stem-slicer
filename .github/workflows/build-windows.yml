name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download FFmpeg and FFprobe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force vendor/ffmpeg-bin | Out-Null
          Invoke-WebRequest -Uri "https://github.com/descriptinc/ffmpeg-ffprobe-static/releases/download/b6.1.2-rc.1/ffmpeg-win32-x64" -OutFile "vendor/ffmpeg-bin/ffmpeg.exe"
          Invoke-WebRequest -Uri "https://github.com/descriptinc/ffmpeg-ffprobe-static/releases/download/b6.1.2-rc.1/ffprobe-win32-x64" -OutFile "vendor/ffmpeg-bin/ffprobe.exe"

      - name: Build executable
        run: pyinstaller StemSlicerWindows.spec

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: Stem-Slicer-1.0-Windows
          path: dist/Stem Slicer 1.0.exe
